apiVersion: apps/v1
kind: Deployment
metadata:
  name: xrsafequality-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xrsafequality-api
  template:
    metadata:
      labels:
        app: xrsafequality-api
    spec:
      containers:
        - name: api
          image: xrsafequality/api:1.0.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: xrsafequality-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: xrsafequality-api
spec:
  selector:
    app: xrsafequality-api
  ports:
    - port: 80
      targetPort: 8000
